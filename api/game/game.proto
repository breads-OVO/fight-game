syntax = "proto3";

package game;
import "api/match/match_queue.proto";
option go_package = "fight-game/pb/game";


// 游戏阶段枚举
enum GameStage {
  STAGE_UNKNOWN = 0;
  STAGE_BAN = 1;         // 禁用阶段（仅竞技）
  STAGE_PICK = 2;        // 选人阶段
  STAGE_FIGHT = 3;       // 战斗阶段
  STAGE_SETTLEMENT = 4;  // 结算阶段
}

// 禁用请求（客户端 → Game，仅竞技）
message BanRequest {
  string playerId = 1;
  string roomId = 2;
  repeated string characterIds = 3;  // 禁用的角色IDs
}

// 可选角色列表
message CharacterOption {
  string characterId = 1;    // 角色ID
  string name = 2;          // 角色名
  bool banned = 3;          // 是否已被禁用
}

// 选人请求（客户端 → Game）
message PickRequest {
  string playerId = 1;
  string roomId = 2;
  CharacterConfig characters = 3;  // 选择的角色ID列表（3个）
}

// 选人配置
message CharacterConfig{
  repeated string characterIds = 1;
  //角色其他特殊道具配置
  OtherConfig otherConfig = 2;
}

// 其他特殊道具配置
message OtherConfig{
  //其他特殊道具配置
}

// 阶段状态推送（Game → 客户端）
message StageState {
  GameStage stage = 1;
  int32 countdown = 2;               // 倒计时秒数
  repeated CharacterOption availableChars = 3;  // 可用角色池
  int32 banCount = 5;                 // 需禁用个数（竞技）
}

// 战斗阶段（帧同步）

// 玩家帧输入（客户端 → Game WS）
message PlayerInput {
  int32 frameNo = 1;
  int32 actionMask = 2;   // 按键掩码（bit0=左, bit1=右, bit2=跳, bit3=轻击, bit4=重击, bit5=防御, bit6=闪避, bit7=技能）
}

// 实体帧状态
message EntityState {
  string entityId = 1;    // 实体ID（playerId 或 projectile_xxx）
  float x = 2;
  float y = 3;
  float vx = 4;
  float vy = 5;
  int32 hp = 6;
  int32 maxHp = 7;
  int32 actionState = 8;  // 当前动作（0=idle, 1=walk, 2=jump, 3=attack_light, 4=attack_heavy, 5=guard, 6=evade, 7=skill, 8=hit, 9=down）
  int32 frameCounter = 9; // 当前动作的第几帧
  int32 comboCount = 10;  // 连击数
  bool invincible = 11;   // 是否无敌帧
  float facing = 12;      // 朝向（1=右, -1=左）
}

// 帧快照（Game → 客户端 WS）
message FrameSnapshot {
  int32 frameNo = 1;
  repeated EntityState entities = 2;
  int32 roundNo = 3;       // 当前回合数
}


// 单回合结果
message RoundResult {
  int32 roundNo = 1;
  string winnerId = 2;        // 回合获胜者
  string loserId = 3;         // 回合失败者
  string winnerCharacterId = 4;  // 胜者使用角色
  string loserCharacterId = 5;   // 败者使用角色
  int32 winnerRemainHp = 6;   // 胜者剩余血量
  int32 roundTimeout = 7;     // 是否超时结束
}

// 整局游戏结果
message GameResult {
  string roomId = 1;
  string winnerId = 2;         // 最终获胜者
  string loserId = 3;          // 最终失败者
  int32 totalRounds = 4;       // 总回合数
  repeated RoundResult rounds = 5;  // 每回合明细
  match.queue.GameType gameType = 6;          // 游戏类型
}

// 结算详情
message SettlementInfo {
  string roomId = 1;
  string winnerId = 2;
  string loserId = 3;
  int32 winnerRemainChamps = 4; // 胜者剩余角色数
  string replayKey = 5;         // 回放key（可选）
}
