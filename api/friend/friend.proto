syntax = "proto3";

package friend;
option go_package = "fight-game/pb/friend";

// 好友关系状态
enum FriendStatus {
  PENDING = 0;    // 待确认
  ACCEPTED = 1;   // 已接受
}

// 好友信息
message FriendInfo {
  string playerId = 1;          // 好友ID
  string nickname = 2;          // 昵称
  string avatarUrl = 3;         // 头像
  int32 level = 4;              // 等级
  int32 rating = 5;             // 段位分
  FriendStatus status = 6;      // 好友状态
  bool isOnline = 7;            // 是否在线
  int64 createdAt = 8;          // 成为好友时间
}

// 搜索玩家信息
message PlayerSearchResult {
  string playerId = 1;          // 玩家ID
  string nickname = 2;          // 昵称
  string avatarUrl = 3;         // 头像
  int32 level = 4;              // 等级
  int32 rating = 5;             // 段位分
  bool isFriend = 6;            // 是否已是好友
}

// 添加好友请求
message AddFriendRequest {
  string playerId = 1;          // 当前玩家ID（由网关填充）
  string friendId = 2;          // 目标玩家ID
}
message AddFriendResponse {
  bool success = 1;
  string message = 2;
}

// 删除好友请求
message RemoveFriendRequest {
  string playerId = 1;          // 当前玩家ID（由网关填充）
  string friendId = 2;          // 目标玩家ID
}
message RemoveFriendResponse {
  bool success = 1;
}

// 获取好友列表请求
message GetFriendListRequest {
  string playerId = 1;          // 当前玩家ID（由网关填充）
}
message GetFriendListResponse {
  repeated FriendInfo friends = 1;
  int32 totalCount = 2;
  int32 onlineCount = 3;
}

// 搜索玩家请求
message SearchPlayerRequest {
  string playerId = 1;          // 当前玩家ID（由网关填充，用于标记是否已是好友）
  string keyword = 2;           // 搜索关键词（昵称或ID）
  int32 page = 3;               // 页码
  int32 pageSize = 4;           // 每页数量
}
message SearchPlayerResponse {
  repeated PlayerSearchResult players = 1;
  int32 total = 2;
}

// 回复好友请求
message ReplyFriendRequest {
  string playerId = 1;          // 当前玩家ID（由网关填充）
  string friendId = 2;          // 请求方玩家ID
  bool accept = 3;              // true=接受, false=拒绝
}
message ReplyFriendResponse {
  bool success = 1;
}

// --- 聊天相关 ---

// 聊天消息类型
enum ChatType {
  PRIVATE = 0;    // 私聊
  ROOM = 1;       // 房间聊天
  GUILD = 2;      // 公会聊天
}

// 聊天消息
message ChatMessage {
  string messageId = 1;         // 消息ID
  string senderId = 2;          // 发送者ID
  string senderName = 3;        // 发送者昵称
  string receiverId = 4;        // 接收者ID（私聊时有效）
  ChatType chatType = 5;        // 聊天类型
  string content = 6;           // 消息内容
  int64 createdAt = 7;          // 发送时间
}

// 发送聊天消息请求
message SendChatMessageRequest {
  string senderId = 1;          // 发送者ID（由网关填充）
  string receiverId = 2;        // 接收者ID（私聊时必填）
  ChatType chatType = 3;        // 聊天类型
  string content = 4;           // 消息内容
}
message SendChatMessageResponse {
  ChatMessage message = 1;
}

// 获取聊天历史请求
message GetChatHistoryRequest {
  string playerId = 1;          // 当前玩家ID（由网关填充）
  string targetId = 2;          // 聊天对象ID（私聊时必填）
  ChatType chatType = 3;        // 聊天类型
  int32 page = 4;               // 页码
  int32 pageSize = 5;           // 每页数量
}
message GetChatHistoryResponse {
  repeated ChatMessage messages = 1;
  int32 total = 2;
}
