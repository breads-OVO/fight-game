syntax = "proto3";

package common;
option go_package = "fight-game/pb/common";

// WebSocket 统一消息包装
message WSMessage {
  int32 msgType = 1;           // 消息类型（对应路由）
  string msgID = 2;            // 消息ID
  string seqId = 3;            // 请求序列号(用于请求-响应匹配)
  bytes body = 4;              // Protobuf body
  string playerId = 5;         // 发送者
  int64 timestamp = 6;         // 时间戳
  int32 frameNo = 7;           // 帧号（战斗场景）
}

// 通用响应
message WSResponse {
  int32 code = 1;              // 0=成功, 非0=错误码
  string message = 2;
  bytes data = 3;              // 具体业务数据
}

// WebSocket 消息类型枚举
enum WSMsgType {
  MSG_UNKNOWN = 0;

  // Auth 相关 (1000~1999)
  MSG_AUTH_LOGIN = 1001;                          // 登录
  MSG_AUTH_LOGIN_RESPONSE = 1002;                 // 登录响应
  MSG_AUTH_REGISTER = 1003;                       // 注册
  MSG_AUTH_REGISTER_RESPONSE = 1004;              // 注册响应
  MSG_AUTH_TOKEN_REFRESH = 1005;                  // 刷新令牌
  MSG_AUTH_TOKEN_REFRESH_RESPONSE = 1006;         // 刷新令牌响应

  // Match 相关 (2000~2999)
  MSG_MATCH_QUEUE = 2001;                         // 进入匹配队列
  MSG_MATCH_QUEUE_RESPONSE = 2002;                // 进入匹配队列响应
  MSG_MATCH_QUEUE_LEAVE = 2003;                   // 离开匹配队列
  MSG_MATCH_QUEUE_LEAVE_RESPONSE = 2004;          // 离开匹配队列响应
  MSG_MATCH_STATUS = 2005;                        // 匹配状态查询
  MSG_MATCH_STATUS_RESPONSE = 2006;               // 匹配状态查询响应

  // Player 相关 (4000~4999)
  MSG_PLAYER_GET_PROFILE = 4001;                                // 获取玩家信息
  MSG_PLAYER_GET_PROFILE_RESPONSE = 4002;                       // 获取玩家信息响应
  MSG_PLAYER_LEVEL_UP = 4003;                                   // 升级
  MSG_PLAYER_LEVEL_UP_RESPONSE = 4004;                          // 升级响应
  MSG_PLAYER_CHANGE_NICKNAME = 4005;                            // 修改昵称
  MSG_PLAYER_CHANGE_NICKNAME_RESPONSE = 4006;                   // 修改昵称响应
  MSG_PLAYER_CHANGE_AVATAR = 4007;                              // 修改头像
  MSG_PLAYER_CHANGE_AVATAR_RESPONSE = 4008;                     // 修改头像响应
  MSG_PLAYER_CHANGE_SIGNATURE = 4009;                           // 修改签名
  MSG_PLAYER_CHANGE_SIGNATURE_RESPONSE = 4010;                  // 修改签名响应
  MSG_PLAYER_GET_CURRENCIES = 4011;                             // 获取货币
  MSG_PLAYER_GET_CURRENCIES_RESPONSE = 4012;                    // 获取货币响应
  MSG_PLAYER_CHANGE_CURRENCY = 4013;                            // 修改货币
  MSG_PLAYER_CHANGE_CURRENCY_RESPONSE = 4014;                   // 修改货币响应
  MSG_PLAYER_GET_INVENTORY = 4015;                              // 获取背包
  MSG_PLAYER_GET_INVENTORY_RESPONSE = 4016;                     // 获取背包响应
  MSG_PLAYER_ADD_ASSET = 4017;                                  // 添加资产
  MSG_PLAYER_ADD_ASSET_RESPONSE = 4018;                         // 添加资产响应
  MSG_PLAYER_REMOVE_ASSET = 4019;                               // 移除资产
  MSG_PLAYER_REMOVE_ASSET_RESPONSE = 4020;                      // 移除资产响应
  MSG_PLAYER_GET_RATING = 4021;                                 // 获取段位分
  MSG_PLAYER_GET_RATING_RESPONSE = 4022;                        // 获取段位分响应
  MSG_PLAYER_UPDATE_RATING = 4023;                              // 修改段位分
  MSG_PLAYER_UPDATE_RATING_RESPONSE = 4024;                     // 修改段位分响应
  MSG_PLAYER_GET_MATCH_STATS = 4025;                            // 获取对战统计
  MSG_PLAYER_GET_MATCH_STATS_RESPONSE = 4026;                   // 获取对战统计响应

  // Game 相关 (3000~3999)
  MSG_GAME_INPUT = 3001;                // 帧输入（客户端→Game）
  MSG_GAME_INPUT_RESPONSE = 3002;       // 帧输入响应
  MSG_GAME_FRAME = 3003;                // 帧状态推送（Game→客户端）
  MSG_GAME_PICK = 3004;                 // 选人请求
  MSG_GAME_PICK_RESPONSE = 3005;        // 选人响应
  MSG_GAME_BAN = 3006;                  // 禁用请求（竞技）
  MSG_GAME_BAN_RESPONSE = 3007;         // 禁用响应
  MSG_GAME_READY = 3008;                // 准备确认
  MSG_GAME_STAGE_STATE = 3009;          // 阶段状态推送
  MSG_GAME_ROUND_RESULT = 3010;         // 回合结果推送
  MSG_GAME_GAME_RESULT = 3011;          // 游戏结束推送
  MSG_GAME_SETTLEMENT = 3012;           // 结算信息推送

  // Mail 相关 (5000~5999)
  MSG_MAIL_GET_LIST = 5001;                         // 获取邮件列表
  MSG_MAIL_GET_LIST_RESPONSE = 5002;                // 获取邮件列表响应
  MSG_MAIL_GET_DETAIL = 5003;                       // 获取邮件详情
  MSG_MAIL_GET_DETAIL_RESPONSE = 5004;              // 获取邮件详情响应
  MSG_MAIL_SEND = 5005;                             // 发送邮件
  MSG_MAIL_SEND_RESPONSE = 5006;                    // 发送邮件响应
  MSG_MAIL_READ = 5007;                             // 标记已读
  MSG_MAIL_READ_RESPONSE = 5008;                    // 标记已读响应
  MSG_MAIL_CLAIM_ATTACHMENT = 5009;                 // 领取附件
  MSG_MAIL_CLAIM_ATTACHMENT_RESPONSE = 5010;        // 领取附件响应
  MSG_MAIL_DELETE = 5011;                           // 删除邮件
  MSG_MAIL_DELETE_RESPONSE = 5012;                  // 删除邮件响应

  // Friend 相关 (6000~6999)
  MSG_FRIEND_ADD = 6001;                            // 添加好友
  MSG_FRIEND_ADD_RESPONSE = 6002;                   // 添加好友响应
  MSG_FRIEND_REPLY = 6003;                          // 回复好友请求
  MSG_FRIEND_REPLY_RESPONSE = 6004;                 // 回复好友请求响应
  MSG_FRIEND_REMOVE = 6005;                         // 删除好友
  MSG_FRIEND_REMOVE_RESPONSE = 6006;                // 删除好友响应
  MSG_FRIEND_GET_LIST = 6007;                       // 获取好友列表
  MSG_FRIEND_GET_LIST_RESPONSE = 6008;              // 获取好友列表响应
  MSG_FRIEND_SEARCH_PLAYER = 6009;                  // 搜索玩家
  MSG_FRIEND_SEARCH_PLAYER_RESPONSE = 6010;         // 搜索玩家响应

  // Chat 相关 (7000~7999)
  MSG_CHAT_SEND = 7001;                             // 发送聊天消息
  MSG_CHAT_SEND_RESPONSE = 7002;                    // 发送聊天消息响应
  MSG_CHAT_GET_HISTORY = 7003;                      // 获取聊天历史
  MSG_CHAT_GET_HISTORY_RESPONSE = 7004;             // 获取聊天历史响应

  // Push 通知相关 (8000~8999) — server→client 主动推送
  MSG_PUSH_NOTIFY = 8001;                           // 通用推送通知
  MSG_PUSH_FRIEND_REQUEST = 8010;                   // 好友请求通知推送
  MSG_PUSH_FRIEND_ACCEPTED = 8011;                  // 好友请求已接受通知推送
  MSG_PUSH_CHAT_MESSAGE = 8020;                     // 新聊天消息推送
  MSG_PUSH_NEW_MAIL = 8030;                         // 新邮件通知推送

  // System 相关 (9000~9999)
  MSG_HEARTBEAT_PING = 9001;
  MSG_HEARTBEAT_PING_REQUEST = 9002;
  MSG_HEARTBEAT_PONG = 9003;
  MSG_HEARTBEAT_PONG_REQUEST = 9004;
  MSG_ERROR = 9999;
}

// 空消息（用于无参数的请求/响应）
message Empty {}