syntax = "proto3";

package mail;
option go_package = "fight-game/pb/mail";

// 邮件状态
enum MailStatus {
  UNREAD = 0;      // 未读
  READ = 1;        // 已读
  CLAIMED = 2;     // 已领取附件
  DELETED = 3;     // 已删除
}

// 邮件类型
enum MailType {
  SYSTEM = 0;      // 系统邮件
  PLAYER = 1;      // 玩家邮件
}

// 附件项
message Attachment {
  string type = 1;      // 附件类型: currency/asset
  string id = 2;        // 货币类型ID或资产ID
  int32 amount = 3;     // 数量
  int32 assetType = 4;  // 资产类型（asset时有效）: 0=NONE, 1=CHARACTER, 2=SKIN, 3=TITLE
}

// 邮件摘要（列表用）
message MailSummary {
  string mailId = 1;            // 邮件ID
  string senderId = 2;          // 发送者ID
  string senderName = 3;        // 发送者名称
  string title = 4;             // 邮件标题
  MailStatus status = 5;        // 邮件状态
  MailType mailType = 6;        // 邮件类型
  bool hasAttachments = 7;      // 是否有附件
  int64 createdAt = 8;          // 发送时间
  int64 expireAt = 9;           // 过期时间
}

// 邮件详情
message MailDetail {
  string mailId = 1;            // 邮件ID
  string senderId = 2;          // 发送者ID
  string senderName = 3;        // 发送者名称
  string title = 4;             // 邮件标题
  string content = 5;           // 邮件正文
  MailStatus status = 6;        // 邮件状态
  MailType mailType = 7;        // 邮件类型
  repeated Attachment attachments = 8;  // 附件列表
  int64 createdAt = 9;          // 发送时间
  int64 readAt = 10;            // 阅读时间
  int64 claimedAt = 11;         // 领取时间
  int64 expireAt = 12;          // 过期时间
}

// 发送邮件请求
message SendMailRequest {
  string receiverId = 1;              // 接收者ID
  string senderId = 2;                // 发送者ID（系统邮件用 "system"）
  string senderName = 3;              // 发送者名称
  string title = 4;                   // 邮件标题
  string content = 5;                 // 邮件正文
  MailType mailType = 6;              // 邮件类型
  repeated Attachment attachments = 7; // 附件列表
  int64 expireAt = 8;                 // 过期时间（0=永不过期）
}
message SendMailResponse {
  string mailId = 1;                  // 发送的邮件ID
}

// 获取邮件列表请求
message GetMailListRequest {
  string playerId = 1;                // 玩家ID
  int32 page = 2;                     // 页码
  int32 pageSize = 3;                 // 每页数量
}
message GetMailListResponse {
  repeated MailSummary mails = 1;     // 邮件列表
  int32 total = 2;                    // 总邮件数
}

// 获取邮件详情请求
message GetMailDetailRequest {
  string playerId = 1;                // 玩家ID
  string mailId = 2;                  // 邮件ID
}
message GetMailDetailResponse {
  MailDetail mail = 1;
}

// 标记已读请求
message ReadMailRequest {
  string playerId = 1;                // 玩家ID
  string mailId = 2;                  // 邮件ID
}
message ReadMailResponse {
  bool success = 1;
}

// 领取附件请求
message ClaimAttachmentRequest {
  string playerId = 1;                // 玩家ID
  string mailId = 2;                  // 邮件ID
}
message ClaimAttachmentResponse {
  bool success = 1;
}

// 删除邮件请求
message DeleteMailRequest {
  string playerId = 1;                // 玩家ID
  string mailId = 2;                  // 邮件ID
}
message DeleteMailResponse {
  bool success = 1;
}
