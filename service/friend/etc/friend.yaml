RpcServer:
  Name: friend.service
  ListenOn: 0.0.0.0:9011
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: fight.friend

MySQL:
  DataSource: root:123456@tcp(127.0.0.1:3306)/fight_game?charset=utf8mb4&parseTime=True&loc=Local
  MaxOpenConns: 100
  MaxIdleConns: 10

Redis:
  Host: 127.0.0.1:6379
  Pass: ""
  DB: 0

MongoDB:
  Uri: mongodb://127.0.0.1:27017
  Database: fight_game

# Gateway 推送服务（用于推送 WS 消息给在线玩家）
GatewayRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: fight.gateway

# Player 服务（获取玩家昵称、头像、等级、段位分）
PlayerRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: fight.player

Log:
  Level: info
