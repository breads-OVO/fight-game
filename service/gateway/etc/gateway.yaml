Name: gateway.service
Host: 0.0.0.0
Port: 9001

WebSocket:
  Port: 9000
  ReadTimeout: 30
  WriteTimeout: 5
  PingInterval: 10
  MaxMessageSize: 4096
  IdleTimeout: 30

AuthRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: fight.auth

MatchRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: fight.match

Etcd:
  Hosts:
    - 127.0.0.1:2379
  Key: fight.gateway

Log:
  Level: info